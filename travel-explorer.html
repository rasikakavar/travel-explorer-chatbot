<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Travel Explorer - Satellite & Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #050a0f;
            --sidebar-bg: #0b121a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .place-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 20px;
        }

        .place-card {
            background: #161f2b;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .place-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .place-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #000;
        }

        .place-info {
            padding: 12px;
        }

        .place-info h4 { font-size: 15px; margin-bottom: 5px; }
        .place-info .tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .place-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

        /* --- MAP AREA --- */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Map controls styling */
        .map-layer-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 8px;
            display: flex;
            gap: 5px;
        }

        .layer-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .layer-btn.active {
            background: var(--accent);
            color: white;
        }

        /* --- CHAT UI --- */
        .chat-toggle {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            z-index: 1001;
        }

        .chat-window {
            position: absolute;
            bottom: 100px;
            right: 24px;
            width: 380px;
            height: 550px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1002;
            overflow: hidden;
        }

        .chat-window.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .chat-header {
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg { max-width: 85%; line-height: 1.5; font-size: 14px; }
        .msg-content { padding: 12px 16px; border-radius: 15px; }
        
        .msg.bot .msg-content { background: #1e293b; border-bottom-left-radius: 2px; }
        .msg.user { align-self: flex-end; }
        .msg.user .msg-content { background: var(--accent); color: white; border-bottom-right-radius: 2px; }

        .insight-card {
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
        }

        .insight-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .insight-item { font-size: 11px; }
        .insight-label { color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: #050a0f;
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .chat-input-area button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Custom Popup Leaflet */
        .leaflet-popup-content-wrapper { background: #111827; color: white; border: 1px solid #374151; }
        .leaflet-popup-tip { background: #111827; }

    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow: 0 0 15px var(--accent-glow);">TE</div>
            <h1 style="font-size:18px">Travel Explorer <span style="font-weight:300; opacity:0.6; font-size: 14px;">| Satellite Edition</span></h1>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <span style="font-size: 12px; color: #22c55e;">● Live Global Data</span>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>Visited Journal</span>
                <span id="counter" style="color:var(--accent)">0</span>
            </div>
            <div class="place-list" id="place-list">
                <!-- Cards appear here -->
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
            
            <div class="map-layer-toggle">
                <button class="layer-btn active" id="btn-sat" onclick="setLayer('sat')">Satellite</button>
                <button class="layer-btn" id="btn-dark" onclick="setLayer('dark')">Night View</button>
            </div>

            <div class="chat-toggle" onclick="toggleChat()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>

            <div class="chat-window" id="chat-window">
                <div class="chat-header">
                    <div style="width:32px; height:32px; background:#22c55e; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px;">AI</div>
                    <div>
                        <div style="font-weight:600; font-size:14px;">Travel Guru</div>
                        <div style="font-size:10px; color:#22c55e;">Online • Ready to Explore</div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="msg bot">
                        <div class="msg-content">
                            Welcome back! I've upgraded my systems with <b>Satellite Imagery</b> and <b>Location Insights</b>. Where shall we travel today?
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Type a destination..." onkeypress="handleKey(event)">
                    <button onclick="sendMessage()">Explore</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = [];
        let layers = {};
        let visitedCount = 0;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([20, 0], 2);

            // Layer 1: Dark Vector
            layers.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            });

            // Layer 2: Real Satellite (Esri World Imagery)
            layers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            });

            layers.sat.addTo(map);
            L.control.zoom({ position: 'bottomleft' }).addTo(map);
        }

        function setLayer(type) {
            if (type === 'sat') {
                map.removeLayer(layers.dark);
                layers.sat.addTo(map);
                document.getElementById('btn-sat').classList.add('active');
                document.getElementById('btn-dark').classList.remove('active');
            } else {
                map.removeLayer(layers.sat);
                layers.dark.addTo(map);
                document.getElementById('btn-dark').classList.add('active');
                document.getElementById('btn-sat').classList.remove('active');
            }
        }

        window.onload = initMap;

        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('active');
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = '';
            processRequest(text);
        }

        function addMessage(text, role, insights = null) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            
            let html = `<div class="msg-content">${text}</div>`;
            
            if (insights) {
                html += `
                <div class="insight-card">
                    <div class="insight-label">Destination Profile</div>
                    <div style="margin-bottom:8px">${insights.summary}</div>
                    <div class="insight-grid">
                        <div class="insight-item">
                            <div class="insight-label">Specialty</div>
                            <div>${insights.specialty}</div>
                        </div>
                        <div class="insight-item">
                            <div class="insight-label">Best Time</div>
                            <div>${insights.time}</div>
                        </div>
                    </div>
                </div>`;
            }

            msgDiv.innerHTML = html;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function processRequest(text) {
            const query = text.toLowerCase();
            const locationQuery = text.replace(/(find|take me to|show me|where is|go to)/gi, "").trim();
            
            if (locationQuery.length < 2) {
                addMessage("Tell me a specific city or landmark name!", "bot");
                return;
            }

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationQuery)}&addressdetails=1&limit=1`);
                const data = await res.json();

                if (data && data.length > 0) {
                    const place = data[0];
                    const lat = parseFloat(place.lat);
                    const lon = parseFloat(place.lon);
                    const name = place.display_name.split(',')[0];

                    // Generate "AI" insights based on coordinates/name (simulated)
                    const insights = generateInsights(place);

                    // Map Update
                    map.flyTo([lat, lon], 14, { duration: 2 });
                    const marker = L.marker([lat, lon]).addTo(map);
                    marker.bindPopup(`<b>${name}</b><br>${insights.specialty}`).openPopup();
                    
                    addMessage(`Traveling to ${name}...`, "bot", insights);
                    addToSidebar(place, insights);
                    visitedCount++;
                    document.getElementById('counter').innerText = visitedCount;

                } else {
                    addMessage("I couldn't find that place. Is the spelling correct?", "bot");
                }
            } catch (e) {
                addMessage("Connection error with the mapping satellite.", "bot");
            }
        }

        function generateInsights(place) {
            // In a real app, this comes from an LLM. Here we simulate travel wisdom.
            const name = place.display_name.split(',')[0];
            const type = place.type || "City";
            
            return {
                summary: `A fascinating ${type} located in ${place.address.country || 'the world'}. It's known for its unique culture and geographical significance.`,
                specialty: ["Authentic Cuisine", "Historical Architecture", "Natural Wonders", "Vibrant Arts Scene", "Hidden Local Gems"][Math.floor(Math.random() * 5)],
                time: ["March to May", "September to November", "June to August", "Year-round"][Math.floor(Math.random() * 4)],
                img: `https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=400&q=80` // Placeholder logic, but we can make it dynamic
            };
        }

        function addToSidebar(place, insights) {
            const list = document.getElementById('place-list');
            const name = place.display_name.split(',')[0];
            const country = place.address.country || "";
            
            // Dynamic image search simulation using Unsplash (No Key needed for simple source)
            const photoUrl = `https://source.unsplash.com/400x300/?${encodeURIComponent(name)},landscape`;

            const card = document.createElement('div');
            card.className = 'place-card';
            card.innerHTML = `
                <img src="${photoUrl}" class="place-img" onerror="this.src='https://via.placeholder.com/400x120?text=Destination'">
                <div class="place-info">
                    <div class="tag">${insights.specialty}</div>
                    <h4>${name}</h4>
                    <p>${country}</p>
                    <div style="font-size:10px; margin-top:8px; color:var(--accent)">Visit: ${insights.time}</div>
                </div>
            `;
            card.onclick = () => {
                map.flyTo([place.lat, place.lon], 15);
            };
            list.prepend(card);
        }
    </script>
</body>
</html>
