<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>Travel Explorer Pro | Satellite · Routes · Pins</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --bg-dark: #050a0f;
            --sidebar-bg: #0b121a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR (enhanced) --- */
        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            padding: 0 18px;
            margin-bottom: 12px;
        }

        .place-list, .pins-list {
            padding: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .place-card, .pin-card {
            background: #161f2b;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease-out;
        }

        .place-card:hover, .pin-card:hover { transform: translateY(-2px); border-color: var(--accent); }

        .place-img-container {
            width: 100%;
            height: 130px;
            background: #0f172a;
            position: relative;
            overflow: hidden;
        }

        .place-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s;
        }

        .place-info {
            padding: 10px 12px;
        }

        .place-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .place-info .tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-bottom: 6px;
        }
        .btn-pin {
            background: rgba(245, 158, 11, 0.2);
            border: none;
            color: var(--warning);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-pin:hover { background: var(--warning); color: #0f172a; }

        .pin-card {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
        }
        .pin-icon { font-size: 20px; }
        .pin-details { flex: 1; }
        .pin-name { font-weight: 600; font-size: 13px; }
        .remove-pin {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Route panel */
        .route-panel {
            padding: 12px 18px;
            background: #0f172a;
            margin: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .route-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .route-input input {
            background: #050a0f;
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 40px;
            color: white;
            font-size: 13px;
            outline: none;
        }
        .route-actions {
            display: flex;
            gap: 8px;
        }
        .btn-route, .btn-clear {
            background: var(--accent);
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            color: white;
            flex: 1;
        }
        .btn-clear { background: #334155; }

        /* MAP + CHAT (existing enhancements) */
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background: #000; }

        .map-layer-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--sidebar-bg);
            border-radius: 12px;
            display: flex;
            gap: 4px;
            padding: 6px;
            backdrop-filter: blur(4px);
        }
        .layer-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .layer-btn.active { background: var(--accent); color: white; }

        /* Chat window */
        .chat-toggle {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            z-index: 1001;
        }
        .chat-window {
            position: absolute;
            bottom: 100px;
            right: 24px;
            width: 380px;
            height: 540px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1002;
            overflow: hidden;
        }
        .chat-window.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .chat-header {
            padding: 16px;
            background: #0f172a;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg { max-width: 85%; font-size: 13px; line-height: 1.4; }
        .msg-content { padding: 10px 14px; border-radius: 18px; }
        .msg.bot .msg-content { background: #1e293b; border-bottom-left-radius: 4px; }
        .msg.user .msg-content { background: var(--accent); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .insight-card {
            margin-top: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            font-size: 11px;
        }
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            background: #050a0f;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 40px;
            color: white;
        }
        .leaflet-popup-content-wrapper { background: #111827; color: white; border-radius: 12px; }
        .leaflet-routing-container { background: #0f172a; color: white; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center;">🌍</div>
        <h1 style="font-size:18px">Travel Explorer <span style="font-weight:300; font-size:13px;">| Routes & Pins</span></h1>
    </div>
    <span style="font-size: 12px; background: #1e293b; padding: 4px 12px; border-radius: 30px;">✨ AI Guide</span>
</header>

<div class="main-container">
    <aside class="sidebar">
        <div class="sidebar-section">
            <div class="section-title">📔 VISITED JOURNAL</div>
            <div class="place-list" id="place-list"></div>
        </div>

        <div class="sidebar-section">
            <div class="section-title">📍 PINNED PLACES</div>
            <div id="pins-container" class="pins-list"></div>
        </div>

        <div class="sidebar-section">
            <div class="section-title">🗺️ ROUTE PLANNER</div>
            <div class="route-panel">
                <div class="route-input">
                    <input type="text" id="route-start" placeholder="Start location (e.g., Eiffel Tower)" value="Paris, France">
                    <input type="text" id="route-end" placeholder="Destination (e.g., Louvre Museum)">
                </div>
                <div class="route-actions">
                    <button class="btn-route" id="show-route-btn">✨ Show Route</button>
                    <button class="btn-clear" id="clear-route-btn">🗑️ Clear</button>
                </div>
                <div style="font-size:10px; margin-top:8px; color:#64748b;">💡 Try "route from London to Stonehenge" in chat!</div>
            </div>
        </div>
    </aside>

    <main id="map-container">
        <div id="map"></div>
        <div class="map-layer-toggle">
            <button class="layer-btn active" id="btn-sat">🛰️ Satellite</button>
            <button class="layer-btn" id="btn-dark">🌙 Night Mode</button>
        </div>
        <div class="chat-toggle" onclick="toggleChat()">💬</div>
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <div style="width:34px; height:34px; background:#22c55e; border-radius:50%; display:flex; align-items:center; justify-content:center;">🧭</div>
                <div><strong>Travel Guru AI</strong><div style="font-size:10px;">🌎 Routes · Pins · Satellite</div></div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg bot"><div class="msg-content">✈️ Ready! Ask me: <br/>📍 "Show me Santorini" <br/>🗺️ "Route from Berlin to Prague" <br/>📌 "Pin this place" after search</div></div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Explore or ask for route..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
    // --- GLOBALS ---
    let map;
    let layers = {};
    let visitedCount = 0;
    let currentSearchMarker = null;
    let activeRoutingControl = null;
    
    // Pins management
    let pinnedPlaces = []; // { id, name, lat, lng, country, insights }
    let pinMarkers = [];
    
    // Helper: generate unique ID
    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    
    // --- MAP INIT ---
    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([34.5, -98], 3);
        layers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri &mdash; Satellite'
        });
        layers.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: 'CartoDB'
        });
        layers.sat.addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        // custom pin icon style (distinct marker)
        map.on('click', () => { });
    }
    
    function setLayer(type) {
        if (type === 'sat') {
            map.removeLayer(layers.dark);
            layers.sat.addTo(map);
            document.getElementById('btn-sat').classList.add('active');
            document.getElementById('btn-dark').classList.remove('active');
        } else {
            map.removeLayer(layers.sat);
            layers.dark.addTo(map);
            document.getElementById('btn-dark').classList.add('active');
            document.getElementById('btn-sat').classList.remove('active');
        }
    }
    
    // --- IMAGE FIX: better unsplash & robust fallback ---
    function getTravelImageUrl(placeName, country) {
        const keywords = encodeURIComponent(`${placeName} ${country} travel landmark scenic`);
        // using unsplash random + sig to force variety, but fallback guaranteed
        return `https://source.unsplash.com/400x300/?${keywords}&sig=${Math.floor(Math.random() * 10000)}`;
    }
    
    // --- Generate insights (dynamic)
    function generateInsights(place, nameOverride = null) {
        const name = nameOverride || (place.display_name ? place.display_name.split(',')[0] : "Destination");
        const country = place.address?.country || "Amazing Region";
        const specialties = [
            "Breathtaking landscapes & natural wonders", "Rich cultural heritage & iconic landmarks",
            "Vibrant nightlife & gastronomy", "Adventure & outdoor activities", "Pristine beaches & coastal views"
        ];
        const times = ["Spring (Mar-May)", "Autumn (Sep-Nov)", "Summer (Jun-Aug)", "Winter (Dec-Feb)"];
        return {
            summary: `${name} in ${country} offers unforgettable experiences and authentic vibes.`,
            specialty: specialties[Math.floor(Math.random() * specialties.length)],
            time: times[Math.floor(Math.random() * times.length)]
        };
    }
    
    // --- SIDEBAR: add visited place (with pin button)
    function addToSidebar(place, insights) {
        const list = document.getElementById('place-list');
        const name = place.display_name.split(',')[0];
        const country = place.address?.country || "Mystic Land";
        const lat = parseFloat(place.lat);
        const lon = parseFloat(place.lon);
        const imgUrl = getTravelImageUrl(name, country);
        
        const card = document.createElement('div');
        card.className = 'place-card';
        card.innerHTML = `
            <div class="place-img-container">
                <img src="${imgUrl}" class="place-img" alt="${name}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=400&q=80'; this.style.opacity=1" onload="this.style.opacity=1">
            </div>
            <div class="place-info">
                <div class="tag">✨ DESTINATION</div>
                <h4>${escapeHtml(name)}</h4>
                <p>${escapeHtml(country)}</p>
                <div style="font-size:10px; color:var(--accent); margin:4px 0">📅 ${insights.time}</div>
                <button class="btn-pin" data-lat="${lat}" data-lon="${lon}" data-name="${escapeHtml(name)}" data-country="${escapeHtml(country)}">📌 Pin this place</button>
            </div>
        `;
        card.querySelector('.btn-pin').addEventListener('click', (e) => {
            e.stopPropagation();
            const btn = e.currentTarget;
            const pinLat = parseFloat(btn.dataset.lat);
            const pinLon = parseFloat(btn.dataset.lon);
            const pinName = btn.dataset.name;
            const pinCountry = btn.dataset.country;
            addPin({ lat: pinLat, lon: pinLon, name: pinName, country: pinCountry, insights });
        });
        card.onclick = () => map.flyTo([lat, lon], 13, { duration: 1.5 });
        list.prepend(card);
    }
    
    // --- PIN FEATURE ---
    function renderPinsUI() {
        const container = document.getElementById('pins-container');
        if (!container) return;
        container.innerHTML = '';
        if (pinnedPlaces.length === 0) {
            container.innerHTML = '<div style="padding:12px; text-align:center; font-size:12px; color:#64748b;">🔖 No pins yet. Click 📌 on visited places</div>';
            return;
        }
        pinnedPlaces.forEach(pin => {
            const pinDiv = document.createElement('div');
            pinDiv.className = 'pin-card';
            pinDiv.innerHTML = `
                <div class="pin-icon">📍</div>
                <div class="pin-details">
                    <div class="pin-name">${escapeHtml(pin.name)}</div>
                    <div style="font-size:10px; color:#94a3b8;">${escapeHtml(pin.country)}</div>
                </div>
                <button class="remove-pin" data-id="${pin.id}">✖</button>
            `;
            pinDiv.querySelector('.remove-pin').addEventListener('click', (e) => {
                e.stopPropagation();
                removePinById(pin.id);
            });
            pinDiv.addEventListener('click', () => {
                map.flyTo([pin.lat, pin.lon], 12);
                L.popup().setLatLng([pin.lat, pin.lon]).setContent(`📍 <b>${pin.name}</b> (pinned)`).openOn(map);
            });
            container.appendChild(pinDiv);
        });
    }
    
    function syncPinMarkers() {
        // remove all existing pin markers from map
        pinMarkers.forEach(m => map.removeLayer(m));
        pinMarkers = [];
        pinnedPlaces.forEach(pin => {
            const marker = L.marker([pin.lat, pin.lon], { title: `Pinned: ${pin.name}` }).addTo(map);
            marker.bindPopup(`<b>📌 ${pin.name}</b><br>${pin.country}<br><button id="unpin-${pin.id}" style="background:#ef4444; border:none; color:white; border-radius:20px; padding:4px 10px; margin-top:5px; cursor:pointer;">Remove Pin</button>`);
            marker.on('popupopen', () => {
                const btn = document.getElementById(`unpin-${pin.id}`);
                if (btn) btn.onclick = () => removePinById(pin.id);
            });
            pinMarkers.push(marker);
        });
    }
    
    function addPin(placeObj) {
        if (!placeObj.lat || !placeObj.lon) return;
        const exists = pinnedPlaces.some(p => p.name === placeObj.name && Math.abs(p.lat - placeObj.lat) < 0.001);
        if (exists) {
            addChatMessageBot("📍 This place is already pinned!", null);
            return;
        }
        const newPin = {
            id: uid(),
            name: placeObj.name,
            lat: placeObj.lat,
            lon: placeObj.lon,
            country: placeObj.country || "Unknown",
            insights: placeObj.insights || { summary: "Pinned spot", specialty: "Local gem", time: "All year" }
        };
        pinnedPlaces.push(newPin);
        renderPinsUI();
        syncPinMarkers();
        addChatMessageBot(`📌 Pinned: ${newPin.name}. Check your pins list!`, null);
    }
    
    function removePinById(id) {
        pinnedPlaces = pinnedPlaces.filter(p => p.id !== id);
        renderPinsUI();
        syncPinMarkers();
        addChatMessageBot("🗑️ Pin removed.", null);
    }
    
    // --- ROUTE LOGIC (geocode + leaflet routing)---
    async function geocodeAddress(query) {
        if (!query.trim()) return null;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
        const data = await res.json();
        if (data && data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
        return null;
    }
    
    async function buildRoute(startText, endText) {
        if (activeRoutingControl) map.removeControl(activeRoutingControl);
        addChatMessageBot(`🔍 Finding route from "${startText}" to "${endText}"...`, null);
        const startPoint = await geocodeAddress(startText);
        const endPoint = await geocodeAddress(endText);
        if (!startPoint || !endPoint) {
            addChatMessageBot("❌ Could not locate start or destination. Try more specific names.", null);
            return;
        }
        // fly to show both bounds
        const bounds = L.latLngBounds([startPoint.lat, startPoint.lng], [endPoint.lat, endPoint.lng]);
        map.fitBounds(bounds, { padding: [50,50] });
        
        activeRoutingControl = L.Routing.control({
            waypoints: [
                L.latLng(startPoint.lat, startPoint.lng),
                L.latLng(endPoint.lat, endPoint.lng)
            ],
            routeWhileDragging: false,
            showAlternatives: false,
            lineOptions: { styles: [{ color: '#3b82f6', weight: 5, opacity: 0.8 }] },
            addWaypoints: false,
            fitSelectedRoutes: false
        }).addTo(map);
        
        addChatMessageBot(`🚗 Route ready: ${startText} → ${endText}. Route line on map.`, null);
    }
    
    function clearRoute() {
        if (activeRoutingControl) {
            map.removeControl(activeRoutingControl);
            activeRoutingControl = null;
            addChatMessageBot("🗺️ Route cleared.", null);
        } else {
            addChatMessageBot("No active route to clear.", null);
        }
    }
    
    // --- CHAT BOT CORE (enhanced with route detection & pin support)---
    function addChatMessageBot(text, insights) {
        const container = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg bot';
        let html = `<div class="msg-content">${text}</div>`;
        if (insights) {
            html += `
            <div class="insight-card">
                <div><strong>✨ ${insights.summary}</strong></div>
                <div style="margin-top:5px;">🏆 ${insights.specialty}<br>📅 Best: ${insights.time}</div>
            </div>`;
        }
        msgDiv.innerHTML = html;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function addChatMessageUser(text) {
        const container = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg user';
        msgDiv.innerHTML = `<div class="msg-content">${escapeHtml(text)}</div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    async function processRequest(text) {
        const lower = text.toLowerCase();
        // --- ROUTE detection ---
        if (lower.includes('route from') && lower.includes(' to ')) {
            const match = text.match(/route from (.+?) to (.+)/i);
            if (match) {
                const start = match[1].trim();
                const end = match[2].trim();
                await buildRoute(start, end);
                return;
            }
        }
        // --- PIN command: "pin this place" but we need last searched context? store last location
        if (lower.includes('pin') && lower.includes('last place') || (lower === 'pin this place' && window.lastSearchedPlace)) {
            if (window.lastSearchedPlace) {
                const p = window.lastSearchedPlace;
                addPin({ lat: p.lat, lon: p.lon, name: p.name, country: p.country, insights: p.insights });
            } else {
                addChatMessageBot("No recent place found. Search a location first like 'Show me Bali'", null);
            }
            return;
        }
        
        // --- NORMAL SEARCH ---
        const locationQuery = text.replace(/(find|take me to|show me|where is|go to|explore)/gi, "").trim();
        if (locationQuery.length < 2) {
            addChatMessageBot("🌎 Tell me a destination or ask 'route from Paris to Rome'", null);
            return;
        }
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationQuery)}&addressdetails=1&limit=1`);
            const data = await res.json();
            if (data && data.length > 0) {
                const place = data[0];
                const lat = parseFloat(place.lat);
                const lon = parseFloat(place.lon);
                const name = place.display_name.split(',')[0];
                const country = place.address?.country || "Unknown";
                const insights = generateInsights(place, name);
                
                // store last place for pin
                window.lastSearchedPlace = { lat, lon, name, country, insights };
                
                map.flyTo([lat, lon], 13, { duration: 2 });
                if (currentSearchMarker) map.removeLayer(currentSearchMarker);
                currentSearchMarker = L.marker([lat, lon]).addTo(map);
                currentSearchMarker.bindPopup(`<b>${name}</b><br>${insights.specialty}<br><button id="quickPinBtn" style="background:#f59e0b; border:none; border-radius:20px; padding:4px 10px; margin-top:5px;">📌 Pin</button>`).openPopup();
                setTimeout(() => {
                    const pinBtn = document.getElementById('quickPinBtn');
                    if (pinBtn) pinBtn.onclick = () => addPin({ lat, lon, name, country, insights });
                }, 100);
                
                addChatMessageBot(`📍 Arrived at ${name}!`, insights);
                addToSidebar(place, insights);
                visitedCount++;
                document.getElementById('counter')?.remove();
                const counterSpan = document.querySelector('#counter') || (()=>{let sp=document.createElement('span'); sp.id='counter'; document.querySelector('.sidebar-header')?.appendChild(sp); return sp;})();
                counterSpan.innerText = visitedCount;
                counterSpan.style.color = 'var(--accent)';
            } else {
                addChatMessageBot("🌿 Couldn't find that place. Try a well-known landmark or city.", null);
            }
        } catch (e) {
            addChatMessageBot("Network error. Check connection & retry.", null);
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('chat-input');
        const txt = input.value.trim();
        if (!txt) return;
        addChatMessageUser(txt);
        input.value = '';
        processRequest(txt);
    }
    
    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    function toggleChat() { document.getElementById('chat-window').classList.toggle('active'); }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // --- EVENT LISTENERS & UI ROUTE ---
    window.onload = () => {
        initMap();
        window.setLayer = setLayer;
        document.getElementById('btn-sat').onclick = () => setLayer('sat');
        document.getElementById('btn-dark').onclick = () => setLayer('dark');
        document.getElementById('show-route-btn').onclick = async () => {
            const start = document.getElementById('route-start').value;
            const end = document.getElementById('route-end').value;
            if (start && end) await buildRoute(start, end);
            else addChatMessageBot("Fill both start and destination fields", null);
        };
        document.getElementById('clear-route-btn').onclick = () => clearRoute();
        // initial empty pins
        renderPinsUI();
        // set visited counter element
        const headerSpan = document.querySelector('.sidebar-header');
        if (!document.getElementById('counter')) {
            const span = document.createElement('span');
            span.id = 'counter';
            span.style.color = 'var(--accent)';
            headerSpan?.appendChild(span);
        }
        document.getElementById('counter').innerText = "0";
    };
</script>
</body>
</html>
