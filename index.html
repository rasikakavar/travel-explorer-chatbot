<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>Travel Explorer | Find Your Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --bg-dark: #020617;
            --sidebar-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(51, 65, 85, 0.6);
            --success: #22c55e;
            --warning: #fbbf24;
            --danger: #f43f5e;
            --glass: rgba(15, 23, 42, 0.8);
            --vibe-nature: #4ade80;
            --vibe-city: #f472b6;
            --vibe-culture: #fb923c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 16px -4px rgba(14, 165, 233, 0.5);
        }
        .logo-icon svg { width: 22px; height: 22px; stroke: white; fill: none; }

        .view-switcher {
            display: flex;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .view-btn {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            color: var(--text-secondary);
            background: transparent;
            transition: 0.2s;
        }
        .view-btn.active {
            background: var(--accent);
            color: #000;
        }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-box { padding: 24px 16px; border-bottom: 1px solid var(--border); }
        .section-title {
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-secondary);
            margin-bottom: 16px; padding-left: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title svg { width: 16px; height: 16px; }

        .vibe-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .vibe-card:hover { 
            border-color: var(--accent); 
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.9);
        }

        .vibe-question {
            font-size: 11px; font-weight: 700;
            color: var(--accent); margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .vibe-place { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
        .vibe-country { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }

        .vibe-actions { display: flex; gap: 8px; }
        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white; padding: 6px 12px;
            border-radius: 10px; font-size: 11px;
            font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
        }
        .action-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .action-btn.primary { background: var(--accent); color: #000; border: none; }

        #map-area { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background: #000; }

        .chat-trigger {
            position: absolute; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px var(--accent-glow);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chat-trigger:hover { transform: scale(1.1); }
        .chat-trigger svg { width: 28px; height: 28px; stroke: #000; fill: none; }

        .chat-bubble {
            position: absolute; bottom: 105px; right: 30px;
            width: 380px; height: 500px; background: var(--sidebar-bg);
            border: 1px solid var(--border); border-radius: 24px;
            display: none; flex-direction: column; z-index: 1001;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .chat-bubble.active { display: flex; }

        .chat-header {
            padding: 20px; background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .bot-img { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .bot-img svg { width: 20px; height: 20px; stroke: #000; fill: none; }

        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .msg.bot { background: #1e293b; color: white; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }

        .quick-chips { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .chip { 
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent);
            color: var(--accent); padding: 6px 12px; border-radius: 20px;
            font-size: 11px; cursor: pointer; font-weight: 700;
        }
        .chip:hover { background: var(--accent); color: #000; }

        .chat-input { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: #0f172a; }
        .chat-input input { flex: 1; background: #020617; border: 1px solid var(--border); padding: 12px 16px; border-radius: 14px; color: white; outline: none; }
        .chat-input button { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .vibe-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; margin-bottom: 8px; }
        .tag-nature { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .tag-city { background: rgba(244, 114, 182, 0.1); color: #f472b6; }
        .tag-culture { background: rgba(251, 146, 60, 0.1); color: #fb923c; }

        .route-mini { background: #1e293b; padding: 12px; border-radius: 16px; margin-top: 12px; border: 1px solid var(--border); }
        .route-mini input { width: 100%; background: #020617; border: 1px solid var(--border); margin-bottom: 8px; padding: 8px; border-radius: 8px; color: white; font-size: 12px; }
        
        /* Leaflet routing UI hide */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
            <h2 style="font-size:18px; font-weight:800;">Travel Guide</h2>
            <p style="font-size:10px; color:var(--accent); font-weight:700; text-transform:uppercase;">Exploring Your Vibe</p>
        </div>
    </div>

    <div class="view-switcher">
        <button class="view-btn active" id="btn-dark">City Map</button>
        <button class="view-btn" id="btn-sat">Satellite View</button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar">
        <div class="section-box">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Your Travel Vibe
            </div>
            <div id="journal-list"></div>
        </div>

        <div class="section-box">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                Your Collection
            </div>
            <div id="pins-list" style="display:flex; flex-direction:column; gap:8px;"></div>
        </div>

        <div class="section-box">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Quick Route
            </div>
            <div class="route-mini">
                <input type="text" id="r-start" placeholder="Where are you?">
                <input type="text" id="r-end" placeholder="Where to?">
                <button class="action-btn primary" style="width:100%; justify-content:center;" id="btn-go">
                    Let's Go! <svg style="width:14px;" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
                <button class="action-btn" id="btn-clear-route" style="width:100%; margin-top:8px; justify-content:center; display:none;">Clear Route</button>
            </div>
        </div>
    </aside>

    <main id="map-area">
        <div id="map"></div>
        
        <div class="chat-trigger" onclick="toggleChat()">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>

        <div class="chat-bubble" id="chat-win">
            <div class="chat-header">
                <div class="bot-img"><svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 6v6l4 2"/></svg></div>
                <div>
                    <h3 style="font-size:14px; font-weight:800;">Travel Buddy AI</h3>
                    <p style="font-size:10px; color:var(--success);">Ask me anything!</p>
                </div>
            </div>
            <div class="chat-msgs" id="msgs">
                <div class="msg bot">
                    Hey! 👋 Need a ride or just exploring? <br/><br/>
                    Where should we go today?
                    <div class="quick-chips">
                        <div class="chip" onclick="chatAction('Show me Bali')">Tropical Vibes 🌴</div>
                        <div class="chip" onclick="chatAction('Show me New York')">Concrete Jungle 🏙️</div>
                        <div class="chip" onclick="chatAction('Show me Rome')">Ancient History 🏛️</div>
                        <div class="chip" onclick="luckyDip()">Feeling Lucky? ✨</div>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="msg-input" placeholder="Find a place..." onkeypress="checkKey(event)">
                <button onclick="sendMsg()"><svg style="width:18px; stroke: #000; fill:none;" viewBox="0 0 24 24" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
    let map;
    let routing;
    let searchMarker;
    let visited = [];
    let pins = [];
    
    let darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
    let satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    // --- PERSONALITY ENGINE ---
    const responseVariations = {
        nature: [
            "Ah, **{name}**! 🌲 Nature is calling. This place is pure soul-therapy.",
            "Great pick! **{name}** is perfect if you want to swap screen-time for green-time. 🏔️",
            "**{name}**? Excellent. The air just feels different there. Ready for some fresh vibes? ✨"
        ],
        city: [
            "**{name}**! 🏙️ The city lights are waiting. Hope you're ready for some energy!",
            "Ooh, **{name}**. Modern, fast, and iconic. A true city explorer's dream. 🏮",
            "Solid choice. **{name}** has a rhythm like no other place. Up for the hustle? 🚕"
        ],
        culture: [
            "**{name}** is steeped in history. 🏛️ Every corner tells a story here.",
            "A cultural masterpiece! **{name}** will definitely leave you inspired. 🎨",
            "Beautiful choice. **{name}** is where tradition meets the modern world. 🏛️"
        ],
        generic: [
            "**{name}**? Never a bad idea! Let's take a look. 📍",
            "Added **{name}** to your travel diary. It looks amazing! ✨"
        ]
    };

    const vibes = {
        nature: { tag: "Nature Lover", class: "tag-nature", icon: "🌲" },
        city: { tag: "City Explorer", class: "tag-city", icon: "🏙️" },
        culture: { tag: "Culture Hunter", class: "tag-culture", icon: "🏛️" }
    };

    function getVibe(place) {
        const h = place.length % 3;
        if(h === 0) return { key: 'nature', ...vibes.nature };
        if(h === 1) return { key: 'city', ...vibes.city };
        return { key: 'culture', ...vibes.culture };
    }

    function generateBotResponse(placeName) {
        const vibe = getVibe(placeName);
        const list = responseVariations[vibe.key] || responseVariations.generic;
        const template = list[Math.floor(Math.random() * list.length)];
        return template.replace("{name}", placeName);
    }

    // --- CORE ---
    function initMap() {
        map = L.map('map', { zoomControl: false, layers: [darkLayer] }).setView([20, 0], 2);
        loadData();
    }

    function setViewMode(mode) {
        if(mode === 'sat') {
            map.removeLayer(darkLayer);
            satelliteLayer.addTo(map);
            document.getElementById('btn-sat').classList.add('active');
            document.getElementById('btn-dark').classList.remove('active');
        } else {
            map.removeLayer(satelliteLayer);
            darkLayer.addTo(map);
            document.getElementById('btn-dark').classList.add('active');
            document.getElementById('btn-sat').classList.remove('active');
        }
    }

    function loadData() {
        const v = localStorage.getItem('vibe_visited');
        const p = localStorage.getItem('vibe_pins');
        if(v) visited = JSON.parse(v);
        if(p) pins = JSON.parse(p);
        renderAll();
    }

    function saveData() {
        localStorage.setItem('vibe_visited', JSON.stringify(visited));
        localStorage.setItem('vibe_pins', JSON.stringify(pins));
    }

    function renderAll() {
        const jl = document.getElementById('journal-list');
        jl.innerHTML = '';
        visited.slice(0, 5).forEach(v => {
            const vibe = getVibe(v.name);
            const card = document.createElement('div');
            card.className = 'vibe-card';
            card.innerHTML = `
                <div class="vibe-tag ${vibe.class}">${vibe.icon} ${vibe.tag}</div>
                <div class="vibe-place">${v.name}</div>
                <div class="vibe-country">${v.country}</div>
                <div class="vibe-actions">
                    <button class="action-btn primary" onclick="event.stopPropagation(); flyTo('${v.lat}','${v.lon}')">Visit</button>
                    <button class="action-btn" onclick="event.stopPropagation(); addPin('${v.name}','${v.country}','${v.lat}','${v.lon}')">Save</button>
                </div>
            `;
            card.onclick = () => flyTo(v.lat, v.lon);
            jl.appendChild(card);
        });

        const pl = document.getElementById('pins-list');
        pl.innerHTML = '';
        pins.forEach(p => {
            const div = document.createElement('div');
            div.style = 'background:rgba(255,255,255,0.03); padding:10px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); cursor:pointer;';
            div.innerHTML = `
                <div onclick="flyTo('${p.lat}', '${p.lon}')">
                    <div style="font-size:13px; font-weight:700;">${p.name}</div>
                    <div style="font-size:10px; color:var(--text-secondary)">${p.country}</div>
                </div>
                <button onclick="removePin('${p.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">&times;</button>
            `;
            pl.appendChild(div);
        });
    }

    async function search(query, silent = false) {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&addressdetails=1&limit=1`);
        const data = await res.json();
        if(data[0]) {
            const p = data[0];
            const name = p.display_name.split(',')[0];
            const country = p.address.country || "Earth";
            
            if(!silent) {
                flyTo(p.lat, p.lon);
                if(searchMarker) map.removeLayer(searchMarker);
                searchMarker = L.marker([p.lat, p.lon]).addTo(map).bindPopup(`<b>${name}</b>`).openPopup();
                addMsgBot(generateBotResponse(name));
            }
            
            if(!visited.some(v => v.name === name)) {
                visited.unshift({ name, country, lat: p.lat, lon: p.lon });
                saveData();
                renderAll();
            }
            return p;
        }
        return null;
    }

    async function buildRoute() {
        const startQuery = document.getElementById('r-start').value;
        const endQuery = document.getElementById('r-end').value;
        
        if(!startQuery || !endQuery) {
            addMsgBot("Please fill in both fields to plan a trip! 🚗");
            return;
        }

        addMsgBot(`Calculating the best route from **${startQuery}** to **${endQuery}**... 🗺️`);

        const startPlace = await search(startQuery, true);
        const endPlace = await search(endQuery, true);

        if(!startPlace || !endPlace) {
            addMsgBot("Sorry, I couldn't find one of those locations. Check the spelling? 🕵️");
            return;
        }

        if(routing) map.removeControl(routing);

        routing = L.Routing.control({
            waypoints: [
                L.latLng(startPlace.lat, startPlace.lon),
                L.latLng(endPlace.lat, endPlace.lon)
            ],
            lineOptions: {
                styles: [{ color: '#38bdf8', weight: 6, opacity: 0.8 }]
            },
            router: L.Routing.osrmv1({
                serviceUrl: 'https://router.project-osrm.org/route/v1'
            }),
            createMarker: function(i, wp) {
                return L.marker(wp.latLng).bindPopup(i === 0 ? "Start" : "Destination");
            }
        }).addTo(map);

        // Hide clear route button
        document.getElementById('btn-clear-route').style.display = 'block';

        // Fit map to route
        const bounds = L.latLngBounds([
            [startPlace.lat, startPlace.lon],
            [endPlace.lat, endPlace.lon]
        ]);
        map.flyToBounds(bounds, { padding: [50, 50] });
        
        addMsgBot("Route mapped! Enjoy the journey! 🚀");
    }

    function clearRoute() {
        if(routing) map.removeControl(routing);
        routing = null;
        document.getElementById('btn-clear-route').style.display = 'none';
        addMsgBot("Route cleared. Where next?");
    }

    // --- UI INTERACTION ---
    function toggleChat() { document.getElementById('chat-win').classList.toggle('active'); }
    function checkKey(e) { if(e.key === 'Enter') sendMsg(); }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const val = input.value.trim();
        if(!val) return;
        
        const m = document.getElementById('msgs');
        const d = document.createElement('div');
        d.className = 'msg user';
        d.innerText = val;
        m.appendChild(d);
        m.scrollTop = m.scrollHeight;
        
        input.value = '';
        search(val);
    }

    function addMsgBot(text) {
        const m = document.getElementById('msgs');
        const d = document.createElement('div');
        d.className = 'msg bot';
        d.innerHTML = text;
        m.appendChild(d);
        m.scrollTop = m.scrollHeight;
    }

    function chatAction(query) {
        const m = document.getElementById('msgs');
        const d = document.createElement('div');
        d.className = 'msg user';
        d.innerText = query;
        m.appendChild(d);
        search(query);
    }

    function luckyDip() {
        const spots = ["Santorini", "Kyoto", "Machu Picchu", "Iceland", "Dubai"];
        const pick = spots[Math.floor(Math.random() * spots.length)];
        chatAction(`Take me to ${pick}`);
    }

    function flyTo(lat, lon) { map.flyTo([lat, lon], 12); }
    function addPin(name, country, lat, lon) {
        if(pins.some(p => p.name === name)) return;
        pins.push({ id: Date.now(), name, country, lat, lon });
        saveData(); renderAll();
        addMsgBot(`Saved **${name}** for later! 🔖`);
    }
    function removePin(id) { pins = pins.filter(p => p.id != id); saveData(); renderAll(); }

    window.onload = () => {
        initMap();
        document.getElementById('btn-dark').onclick = () => setViewMode('dark');
        document.getElementById('btn-sat').onclick = () => setViewMode('sat');
        document.getElementById('btn-go').onclick = buildRoute;
        document.getElementById('btn-clear-route').onclick = clearRoute;
    };
</script>
</body>
</html>
